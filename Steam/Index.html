<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>

    <!-- Instant redirect -->
    <meta http-equiv="refresh" content="0; url=https://steamcommunity.com/id/cheese-man/">

    <script>
        // Fallback redirect (more reliable)
        window.location.replace("https://steamcommunity.com/id/cheese-man/");
    </script>
</head>
<body>
    <p>If you are not redirected automatically, 
        <a href="https://steamcommunity.com/id/cheese-man/">click here</a>.
    </p>
</body>
</html>
